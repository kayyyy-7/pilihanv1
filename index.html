<html>
<head>
    <title>Store of the Adidas X AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .hero-section {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 8%;
            color: white;
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 0;
        }

        .top-left-branding {
            position: absolute;
            top: 40px;
            left: 8%;
            z-index: 2;
        }

        .top-left-branding img {
            width: 60px; 
            display: block;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }

        .hero-content h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 10px;
            font-weight: 800;
            text-transform: capitalize;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .button-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px;
            transition: all 0.3s ease;
            min-width: 160px;
        }

        .btn-shop {
            background-color: white;
            color: black;
        }

        .btn-shop:hover {
            background-color: #e0e0e0;
        }

        .btn-wa {
            background-color: #25D366;
            color: white;
        }

        .btn-wa:hover {
            background-color: #1eb954;
            transform: translateY(-3px);
        }

        @media (max-width: 600px) {
            .hero-section {
                text-align: center;
                justify-content: center;
            }
            .button-container {
                flex-direction: column;
                align-items: center;
            }
            .top-left-branding {
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <video autoplay muted loop playsinline class="bg-video">
            <source src="vid1.mp4" type="video/mp4">
        </video>

        <div class="overlay"></div>

        <div class="top-left-branding">
            <img src="g1.png" alt="Logo">
        </div>

        <div class="hero-content">
            <h1>Store of the <br> Adidas Indonesia</h1>
            <p>Imported From Germany</p>
            
            <div class="button-container">
                <a href="isi.html" class="btn btn-shop">Shop Now</a>

                <a href="https://wa.me/0881011909323?text=Halo%20Admin,%20saya%20ingin%20tanya%20tentang%20Jersey" 
                   target="_blank" 
                   class="btn btn-wa">
                    <i class="fab fa-whatsapp"></i> Chat Admin
                </a>
            </div>
        </div>
    </div>

</body>
</html>
